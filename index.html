
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚀 AI Decision Helper</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    perspective: 1200px;
}

/* TITLE */
h1 {
    margin: 20px;
    font-size: 32px;
    text-shadow: 0 0 20px cyan, 0 0 40px blue;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px cyan; }
    to { text-shadow: 0 0 30px blue; }
}

.container {
    width: 90%;
    margin: auto;
}

/* BUTTONS */
button {
    padding: 12px 20px;
    margin: 10px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.add-btn { background: linear-gradient(45deg, cyan, blue); }
.find-btn { background: linear-gradient(45deg, gold, orange); }
.clear-btn { background: linear-gradient(45deg, red, darkred); }

button:hover {
    transform: translateY(-5px) scale(1.1);
    box-shadow: 0 10px 30px rgba(255,255,255,0.5);
}

/* 3D CARD */
.card {
    background: rgba(255,255,255,0.1);
    margin: 20px;
    padding: 20px;
    border-radius: 20px;
    transform-style: preserve-3d;
    transition: transform 0.5s, box-shadow 0.5s;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

/* HOVER 3D EFFECT */
.card:hover {
    transform: rotateY(10deg) rotateX(10deg) scale(1.05);
    box-shadow: 0 30px 60px rgba(0,0,0,0.9);
}

/* INPUTS */
input {
    padding: 10px;
    width: 70%;
    margin: 6px;
    border-radius: 10px;
    border: none;
    text-align: center;
}

/* RESULT */
.result {
    font-size: 22px;
    margin-top: 20px;
    color: lightgreen;
    text-shadow: 0 0 10px green;
    animation: pop 0.6s ease;
}

@keyframes pop {
    from { transform: scale(0); }
    to { transform: scale(1); }
}

/* FLOATING 3D BOX */
.cube {
    width: 60px;
    height: 60px;
    margin: 40px auto;
    background: linear-gradient(45deg, cyan, blue);
    border-radius: 10px;
    animation: rotate3d 4s linear infinite;
}

@keyframes rotate3d {
    0% { transform: rotateX(0) rotateY(0); }
    100% { transform: rotateX(360deg) rotateY(360deg); }
}
</style>
</head>

<body>

<h1>🚀 AI Decision Helper</h1>

<div class="container">
    <button class="add-btn" onclick="addProject()">➕ Add Project</button>
    <button class="find-btn" onclick="findBest()">🏆 Find Best Project</button>
    <button class="clear-btn" onclick="clearAll()">Clear</button>

    <div id="projects"></div>
    <div class="result" id="result"></div>
</div>

<!-- 3D rotating element -->
<div class="cube"></div>

<script>
let projectCount = 0;

function addProject() {
    projectCount++;

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <h3>Project ${projectCount}</h3>
        <input type="text" placeholder="Project Name" class="name"><br>

        <label>Risk (1-10)</label><br>
        <input type="number" min="1" max="10" value="5" class="risk"><br>

        <label>Cost (1-10)</label><br>
        <input type="number" min="1" max="10" value="5" class="cost"><br>

        <label>Usage (1-10)</label><br>
        <input type="number" min="1" max="10" value="5" class="usage"><br>

        <label>Benefits (1-10)</label><br>
        <input type="number" min="1" max="10" value="5" class="benefit"><br>
    `;

    document.getElementById("projects").appendChild(div);
}

function findBest() {
    let cards = document.getElementsByClassName("card");
    let bestScore = -Infinity;
    let bestProject = "";

    for (let card of cards) {
        let name = card.querySelector(".name").value;
        let risk = parseInt(card.querySelector(".risk").value) || 0;
        let cost = parseInt(card.querySelector(".cost").value) || 0;
        let usage = parseInt(card.querySelector(".usage").value) || 0;
        let benefit = parseInt(card.querySelector(".benefit").value) || 0;

        let score = (benefit * 2 + usage * 2) - (risk + cost);

        if (score > bestScore) {
            bestScore = score;
            bestProject = name || "Unnamed Project";
        }
    }

    document.getElementById("result").innerText =
        bestProject ? "🏆 Best Project: " + bestProject : "Add projects first!";
}

function clearAll() {
    document.getElementById("projects").innerHTML = "";
    document.getElementById("result").innerText = "";
    projectCount = 0;
}
</script>

</body>
</html>
