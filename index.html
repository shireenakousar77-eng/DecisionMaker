
<!DOCTYPE html>
<html>
<head>
    <title>AI Decision Helper</title>

    

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(-45deg, #1f1c2c, #928dab, #00c6ff, #0072ff);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            transform: perspective(1000px);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            margin-bottom: 20px;
        }

        .slider-box {
            margin-bottom: 15px;
        }

        label {
            display: flex;
            justify-content: space-between;
        }

        input[type="range"] {
            width: 100%;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            box-shadow: 0 5px 15px rgba(0,114,255,0.5);
        }

        .add-btn:hover {
            transform: translateY(-3px) scale(1.05);
        }

        .clear-btn {
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            color: white;
            box-shadow: 0 5px 15px rgba(255,78,80,0.5);
        }

        .clear-btn:hover {
            animation: shake 0.3s;
        }

        @keyframes shake {
            0% {transform: translateX(0);}
            25% {transform: translateX(-5px);}
            50% {transform: translateX(5px);}
            75% {transform: translateX(-5px);}
            100% {transform: translateX(0);}
        }

        table {
            width: 100%;
            margin-top: 25px;
            border-collapse: collapse;
            border-radius: 15px;
            overflow: hidden;
        }

        th {
            background: rgba(255,255,255,0.2);
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
            background: rgba(255,255,255,0.08);
            transition: 0.3s;
        }

        tr:hover td {
            background: rgba(255,255,255,0.2);
            transform: scale(1.02);
        }

        .best {
            margin-top: 20px;
            padding: 18px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            background: linear-gradient(135deg, #00ff87, #60efff);
            color: black;
            box-shadow: 0 0 20px rgba(0,255,135,0.8);
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px #00ff87; }
            to { box-shadow: 0 0 30px #60efff; }
        }
    </style>

    <script>
        function updateValue(id, value) {
            document.getElementById(id).innerText = value;
        }
    </script>

</head>

<body>

<div class="container">

    <h1>🚀 AI Decision Helper</h1>

    <form method="POST">

        <input type="text" name="name" placeholder="Project Name" required>

        <div class="slider-box">
            <label>Cost <span id="costVal">5</span></label>
            <input type="range" name="cost" min="0" max="10" value="5"
                   oninput="updateValue('costVal', this.value)">
        </div>

        <div class="slider-box">
            <label>Benefit <span id="benefitVal">5</span></label>
            <input type="range" name="benefit" min="0" max="10" value="5"
                   oninput="updateValue('benefitVal', this.value)">
        </div>

        <div class="slider-box">
            <label>Risk <span id="riskVal">5</span></label>
            <input type="range" name="risk" min="0" max="10" value="5"
                   oninput="updateValue('riskVal', this.value)">
        </div>

        <div class="slider-box">
            <label>Usage <span id="usageVal">5</span></label>
            <input type="range" name="usage" min="0" max="10" value="5"
                   oninput="updateValue('usageVal', this.value)">
        </div>

        <div class="btn-group">
            <button class="add-btn" type="submit"> ➕Add</button>
        </div>

    </form>

    <form method="POST" action="/clear">
        <button class="clear-btn" type="submit">🗑️ Clear All</button>
    </form>

    {% if projects %}
    <table>
        <tr>
            <th>Project</th>
            <th>Cost</th>
            <th>Benefit</th>
            <th>Risk</th>
            <th>Usage</th>
            <th>Score</th>
        </tr>

        {% for p in projects %}
        <tr>
            <td>{{ p.name }}</td>
            <td>{{ p.cost }}</td>
            <td>{{ p.benefit }}</td>
            <td>{{ p.risk }}</td>
            <td>{{ p.usage }}</td>
            <td><b>{{ p.score }}</b></td>
        </tr>
        {% endfor %}
    </table>
    {% endif %}

    {% if best %}
    <div class="best">
        🏆 Best Project: {{ best.name }} (Score: {{ best.score }})
    </div>
    {% endif %}

</div>

</body>
</html>
